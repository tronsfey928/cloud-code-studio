<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800">
  <defs>
    <style>
      text { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1280" height="800" fill="#F8F8FC"/>

  <!-- Top bar -->
  <rect width="1280" height="48" fill="#FFFFFF"/>
  <line x1="0" y1="48" x2="1280" y2="48" stroke="#E8E8F0" stroke-width="1"/>
  <!-- Back button -->
  <rect x="8" y="10" width="30" height="28" rx="6" fill="transparent"/>
  <text x="16" y="29" font-size="16" fill="#4A4A6A">←</text>
  <!-- Sidebar toggle -->
  <rect x="44" y="10" width="30" height="28" rx="6" fill="transparent"/>
  <rect x="50" y="16" width="18" height="16" rx="2" fill="none" stroke="#4A4A6A" stroke-width="1.5"/>
  <line x1="56" y1="16" x2="56" y2="32" stroke="#4A4A6A" stroke-width="1.5"/>
  <!-- Separator -->
  <line x1="80" y1="14" x2="80" y2="34" stroke="#E8E8F0" stroke-width="1"/>
  <!-- Workspace name -->
  <text x="92" y="29" font-size="13" font-weight="500" fill="#1A1A2E">cloud-code-studio</text>
  <!-- Settings button -->
  <rect x="1186" y="10" width="82" height="28" rx="6" fill="transparent"/>
  <text x="1196" y="29" font-size="13" fill="#4A4A6A">⚙ Settings</text>

  <!-- Left sidebar (File Explorer) - 256px wide -->
  <rect x="0" y="48" width="256" height="752" fill="#FFFFFF"/>
  <line x1="256" y1="48" x2="256" y2="800" stroke="#E8E8F0" stroke-width="1"/>

  <!-- File Explorer header -->
  <rect x="0" y="48" width="256" height="40" fill="#FFFFFF"/>
  <text x="16" y="73" font-size="12" font-weight="600" fill="#4A4A6A">FILES</text>

  <!-- File tree -->
  <!-- src/ folder (expanded) -->
  <text x="16" y="106" font-size="13" fill="#1A1A2E">▾ src</text>
  <!-- components/ -->
  <text x="32" y="126" font-size="13" fill="#4A4A6A">▾ components</text>
  <text x="48" y="145" font-size="12" fill="#6A6A8A">📄 Chat.tsx</text>
  <text x="48" y="163" font-size="12" fill="#6A6A8A">📄 FileExplorer.tsx</text>
  <text x="48" y="181" font-size="12" fill="#6A6A8A">📄 OpenCodeSettings.tsx</text>
  <!-- pages/ -->
  <text x="32" y="201" font-size="13" fill="#4A4A6A">▾ pages</text>
  <text x="48" y="220" font-size="12" fill="#6A6A8A">📄 Dashboard.tsx</text>
  <text x="48" y="238" font-size="12" fill="#6A6A8A">📄 Workspace.tsx</text>
  <!-- stores/ -->
  <text x="32" y="258" font-size="13" fill="#4A4A6A">▸ stores</text>
  <!-- hooks/ -->
  <text x="32" y="278" font-size="13" fill="#4A4A6A">▸ hooks</text>
  <!-- files -->
  <text x="32" y="298" font-size="12" fill="#6A6A8A">📄 App.tsx</text>
  <text x="32" y="316" font-size="12" fill="#6A6A8A">📄 app.css</text>
  <text x="32" y="334" font-size="12" fill="#6A6A8A">📄 main.tsx</text>
  <!-- root files -->
  <text x="16" y="354" font-size="12" fill="#6A6A8A">📄 package.json</text>
  <text x="16" y="372" font-size="12" fill="#6A6A8A">📄 tsconfig.json</text>
  <text x="16" y="390" font-size="12" fill="#6A6A8A">📄 vite.config.ts</text>
  <text x="16" y="408" font-size="12" fill="#6A6A8A">📄 README.md</text>

  <!-- Chat area (right of sidebar) -->
  <rect x="256" y="48" width="1024" height="752" fill="#F8F8FC"/>

  <!-- Messages area -->
  <!-- Message 1 - User -->
  <rect x="720" y="72" width="520" height="64" rx="10" fill="#3D5AF1"/>
  <text x="740" y="98" font-size="13" fill="#FFFFFF">请帮我在 src/utils 目录下添加一个</text>
  <text x="740" y="116" font-size="13" fill="#FFFFFF">formatDate 工具函数，支持多种格式。</text>
  <text x="1222" y="148" font-size="11" fill="#AAAACC" text-anchor="end">14:23</text>

  <!-- Message 2 - AI (text) -->
  <rect x="276" y="164" width="580" height="80" rx="10" fill="#FFFFFF" stroke="#E8E8F0" stroke-width="1"/>
  <text x="296" y="188" font-size="13" fill="#1A1A2E">好的，我来为你创建 formatDate 工具函数。</text>
  <text x="296" y="208" font-size="13" fill="#1A1A2E">这个函数将支持 yyyy-MM-dd、MM/dd/yyyy</text>
  <text x="296" y="228" font-size="13" fill="#1A1A2E">以及相对时间（如"2分钟前"）等多种格式。</text>

  <!-- Tool call card -->
  <rect x="276" y="260" width="380" height="52" rx="8" fill="#F0F2FF" stroke="#CDD2FF" stroke-width="1"/>
  <text x="296" y="282" font-size="12" font-weight="500" fill="#2A3AAA">🔧 file_write</text>
  <text x="296" y="300" font-size="11" fill="#4A5ACC">src/utils/formatDate.ts</text>

  <!-- Code change card -->
  <rect x="276" y="328" width="380" height="52" rx="8" fill="#EDFBF2" stroke="#B0EDD0" stroke-width="1"/>
  <text x="296" y="350" font-size="12" font-weight="500" fill="#1A6A3A">✓ created</text>
  <text x="296" y="368" font-size="11" fill="#2A8A4A">src/utils/formatDate.ts (+64 lines)</text>

  <!-- Message 3 - AI (completion) -->
  <rect x="276" y="396" width="580" height="116" rx="10" fill="#FFFFFF" stroke="#E8E8F0" stroke-width="1"/>
  <text x="296" y="420" font-size="13" fill="#1A1A2E">已创建 src/utils/formatDate.ts，包含以下功能：</text>
  <text x="296" y="442" font-size="12" fill="#4A4A6A">• formatDate(date, 'yyyy-MM-dd') → "2026-04-01"</text>
  <text x="296" y="460" font-size="12" fill="#4A4A6A">• formatDate(date, 'MM/dd/yyyy') → "04/01/2026"</text>
  <text x="296" y="478" font-size="12" fill="#4A4A6A">• formatDate(date, 'relative') → "2分钟前"</text>
  <text x="296" y="496" font-size="12" fill="#4A4A6A">• formatDate(date, 'full') → "2026年4月1日 14:23"</text>
  <text x="844" y="524" font-size="11" fill="#AAAACC" text-anchor="end">14:23</text>

  <!-- Typing indicator -->
  <rect x="276" y="530" width="72" height="32" rx="16" fill="#FFFFFF" stroke="#E8E8F0" stroke-width="1"/>
  <circle cx="300" cy="546" r="4" fill="#AAAACC"/>
  <circle cx="316" cy="546" r="4" fill="#8888CC"/>
  <circle cx="332" cy="546" r="4" fill="#AAAACC"/>

  <!-- Input area -->
  <rect x="256" y="736" width="1024" height="64" fill="#FFFFFF" stroke="#E8E8F0" stroke-width="1"/>
  <rect x="276" y="748" width="880" height="40" rx="8" fill="#F4F4F8" stroke="#E0E0EC" stroke-width="1"/>
  <text x="296" y="773" font-size="13" fill="#AAAACC">给 AI 发送消息…</text>
  <!-- Send button -->
  <rect x="1182" y="748" width="80" height="40" rx="8" fill="#3D5AF1"/>
  <text x="1202" y="773" font-size="13" font-weight="500" fill="#FFFFFF">发送</text>
</svg>
