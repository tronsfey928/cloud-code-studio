<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800">
  <defs>
    <style>
      text { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; }
    </style>
  </defs>

  <!-- Blurred background (workspace) -->
  <rect width="1280" height="800" fill="#F8F8FC"/>
  <!-- Dim overlay -->
  <rect width="1280" height="800" fill="#0A0A1A" opacity="0.5"/>

  <!-- Dialog box -->
  <rect x="340" y="80" width="600" height="640" rx="14" fill="#FFFFFF" stroke="#E8E8F0" stroke-width="1"/>

  <!-- Dialog header -->
  <text x="368" y="122" font-size="17" font-weight="700" fill="#1A1A2E">AI Configuration</text>
  <text x="368" y="144" font-size="13" fill="#8888A8">Configure the AI engine, LLM provider, and tools for this workspace.</text>
  <!-- Close button -->
  <text x="912" y="118" font-size="20" fill="#AAAACC">×</text>

  <line x1="340" y1="160" x2="940" y2="160" stroke="#F0F0F8" stroke-width="1"/>

  <!-- Section: Coding Provider -->
  <text x="368" y="190" font-size="12" font-weight="600" fill="#4A4A6A">CODING PROVIDER</text>
  <!-- Provider select -->
  <rect x="368" y="200" width="564" height="38" rx="8" fill="#F8F8FC" stroke="#D8D8EC" stroke-width="1"/>
  <text x="386" y="224" font-size="13" fill="#1A1A2E">Claude Code</text>
  <text x="900" y="224" font-size="12" fill="#AAAACC">▾</text>

  <!-- Section: LLM Provider + Model -->
  <text x="368" y="264" font-size="12" font-weight="600" fill="#4A4A6A">LLM PROVIDER</text>
  <rect x="368" y="274" width="270" height="38" rx="8" fill="#F8F8FC" stroke="#D8D8EC" stroke-width="1"/>
  <text x="386" y="298" font-size="13" fill="#1A1A2E">Anthropic</text>
  <text x="622" y="298" font-size="12" fill="#AAAACC">▾</text>

  <text x="662" y="264" font-size="12" font-weight="600" fill="#4A4A6A">MODEL</text>
  <rect x="662" y="274" width="270" height="38" rx="8" fill="#F8F8FC" stroke="#D8D8EC" stroke-width="1"/>
  <text x="680" y="298" font-size="13" fill="#1A1A2E">claude-sonnet-4-6</text>
  <text x="916" y="298" font-size="12" fill="#AAAACC">▾</text>

  <!-- API Key -->
  <text x="368" y="342" font-size="12" font-weight="600" fill="#4A4A6A">API KEY</text>
  <rect x="368" y="352" width="564" height="38" rx="8" fill="#F8F8FC" stroke="#D8D8EC" stroke-width="1"/>
  <text x="386" y="376" font-size="13" fill="#6A6A8A">••••••••••••••••••••••••1234</text>

  <!-- MCP Servers -->
  <text x="368" y="420" font-size="12" font-weight="600" fill="#4A4A6A">MCP SERVERS</text>
  <!-- MCP item 1 -->
  <rect x="368" y="430" width="564" height="44" rx="8" fill="#F8F8FC" stroke="#D8D8EC" stroke-width="1"/>
  <rect x="382" y="446" width="28" height="14" rx="7" fill="#3D5AF1"/>
  <circle cx="395" cy="453" r="6" fill="#FFFFFF"/>
  <text x="420" y="456" font-size="13" fill="#1A1A2E">github-mcp</text>
  <text x="420" y="468" font-size="11" fill="#AAAACC">http://localhost:3001  ·  sse</text>
  <text x="904" y="456" font-size="13" fill="#AAAACC">🗑</text>

  <!-- Add MCP button -->
  <rect x="368" y="482" width="140" height="32" rx="6" fill="transparent" stroke="#D8D8EC" stroke-width="1"/>
  <text x="387" y="502" font-size="12" fill="#4A4A6A">+ Add MCP Server</text>

  <!-- Setup Commands -->
  <text x="368" y="540" font-size="12" font-weight="600" fill="#4A4A6A">SETUP COMMANDS</text>
  <text x="368" y="556" font-size="11" fill="#AAAACC">Run before each AI session. Max 20 commands, 2048 chars each.</text>
  <!-- Command item -->
  <rect x="368" y="566" width="564" height="36" rx="8" fill="#1E1E2E"/>
  <text x="384" y="588" font-size="12" font-family="ui-monospace, monospace" fill="#A8D8A8">npm install</text>
  <text x="904" y="588" font-size="13" fill="#6A6A8A">🗑</text>
  <!-- Add command button -->
  <rect x="368" y="610" width="128" height="32" rx="6" fill="transparent" stroke="#D8D8EC" stroke-width="1"/>
  <text x="385" y="630" font-size="12" fill="#4A4A6A">+ Add Command</text>

  <line x1="340" y1="652" x2="940" y2="652" stroke="#F0F0F8" stroke-width="1"/>

  <!-- Footer buttons -->
  <rect x="724" y="668" width="80" height="36" rx="8" fill="transparent" stroke="#D8D8EC" stroke-width="1"/>
  <text x="752" y="690" font-size="13" fill="#4A4A6A">Cancel</text>
  <rect x="816" y="668" width="108" height="36" rx="8" fill="#3D5AF1"/>
  <text x="830" y="690" font-size="13" font-weight="500" fill="#FFFFFF">Save Configuration</text>
</svg>
